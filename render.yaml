services:
  - type: web
    name: kavachforwork-web
    runtime: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: VITE_API_URL
        fromService:
          type: web
          name: kavachforwork-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_SOCKET_URL
        fromService:
          type: web
          name: kavachforwork-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: kavachforwork-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        fromService:
          type: web
          name: kavachforwork-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: WEATHERSTACK_API_KEY
        sync: false
      - key: OPENAQ_BASE_URL
        value: https://api.openaq.org/v2
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: kavachforwork-ai
          envVarKey: RENDER_EXTERNAL_URL
      - key: AI_WEATHER_ORACLE_ENABLED
        value: "false"
      - key: ADMIN_EMAIL
        value: admin@kavachforwork.in
      - key: ADMIN_PASSWORD
        sync: false
      - key: DEMO_PASSWORD
        sync: false

  - type: web
    name: kavachforwork-ai
    runtime: python
    plan: free
    rootDir: ai
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
